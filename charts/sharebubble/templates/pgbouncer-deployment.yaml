{{- if .Values.pgbouncer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bubble.pgbouncer.fullname" . }}
  labels:
    {{- include "bubble.labels" . | nindent 4 }}
    app.kubernetes.io/component: pgbouncer
spec:
  replicas: {{ .Values.pgbouncer.replicaCount }}
  selector:
    matchLabels:
      {{- include "bubble.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: pgbouncer
  template:
    metadata:
      labels:
        {{- include "bubble.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: pgbouncer
    spec:
      {{- include "bubble.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "bubble.serviceAccountName" . }}
      containers:
        - name: pgbouncer
          image: "{{ .Values.pgbouncer.image.repository }}:{{ .Values.pgbouncer.image.tag }}"
          imagePullPolicy: {{ .Values.pgbouncer.image.pullPolicy }}
          ports:
            - name: pgbouncer
              containerPort: {{ .Values.pgbouncer.service.port }}
              protocol: TCP
          env:
            - name: DB_HOST
              value: {{ include "bubble.postgresql.direct.host" . | quote }}
            - name: DB_PORT
              value: {{ include "bubble.postgresql.direct.port" . | quote }}
            - name: DB_NAME
              value: {{ include "bubble.postgresql.database" . | quote }}
            - name: DB_USER
              value: {{ include "bubble.postgresql.username" . | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "bubble.postgresql.secretName" . }}
                  key: {{ include "bubble.postgresql.secretKey" . }}
            - name: LISTEN_PORT
              value: {{ .Values.pgbouncer.service.port | quote }}
            - name: POOL_MODE
              value: {{ .Values.pgbouncer.poolMode | quote }}
            - name: AUTH_TYPE
              value: {{ .Values.pgbouncer.authType | quote }}
            - name: MAX_CLIENT_CONN
              value: {{ .Values.pgbouncer.maxClientConn | quote }}
            - name: DEFAULT_POOL_SIZE
              value: {{ .Values.pgbouncer.defaultPoolSize | quote }}
            - name: MIN_POOL_SIZE
              value: {{ .Values.pgbouncer.minPoolSize | quote }}
            - name: RESERVE_POOL_SIZE
              value: {{ .Values.pgbouncer.reservePoolSize | quote }}
            - name: RESERVE_POOL_TIMEOUT
              value: {{ .Values.pgbouncer.reservePoolTimeout | quote }}
            - name: SERVER_IDLE_TIMEOUT
              value: {{ .Values.pgbouncer.serverIdleTimeout | quote }}
            - name: LOG_CONNECTIONS
              value: {{ .Values.pgbouncer.logConnections | quote }}
            - name: LOG_DISCONNECTIONS
              value: {{ .Values.pgbouncer.logDisconnections | quote }}
            {{- with .Values.pgbouncer.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            tcpSocket:
              port: pgbouncer
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: pgbouncer
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.pgbouncer.resources | nindent 12 }}
      {{- with .Values.pgbouncer.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pgbouncer.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pgbouncer.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
