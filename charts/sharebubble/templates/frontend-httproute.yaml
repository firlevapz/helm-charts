{{- if and .Values.frontend.enabled .Values.frontend.httpRoute.enabled }}
{{- /* Resolve parentRefs: use explicit value if provided, otherwise derive from the chart-managed Gateway */}}
{{- $parentRefs := .Values.frontend.httpRoute.parentRefs }}
{{- if not $parentRefs }}
  {{- if .Values.frontend.gateway.enabled }}
    {{- $listeners := .Values.frontend.gateway.listeners | default (list) }}
    {{- if lt (len $listeners) 1 }}
      {{- fail "frontend.gateway.listeners must contain at least one listener when deriving default parentRefs" }}
    {{- end }}
    {{- $firstListener := index $listeners 0 }}
    {{- $sectionName := $firstListener.name | default "" }}
    {{- if not $sectionName }}
      {{- fail "frontend.gateway.listeners[0].name is required when deriving default parentRefs" }}
    {{- end }}
    {{- $parentRefs = list (dict "name" (include "bubble.frontend.gateway.fullname" .) "sectionName" $sectionName) }}
  {{- else }}
    {{- fail "frontend.httpRoute.parentRefs must be provided when frontend.gateway.enabled=false" }}
  {{- end }}
{{- end }}
{{- $backendPrefixes := .Values.frontend.httpRoute.backendPrefixes | default (list "/api" "/accounts" "/admin") }}
{{- $frontendPrefix := .Values.frontend.httpRoute.frontendPrefix | default "/" }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "bubble.frontend.fullname" . }}
  labels:
    {{- include "bubble.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  {{- with .Values.frontend.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- toYaml $parentRefs | nindent 4 }}
  {{- with .Values.frontend.httpRoute.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- if and .Values.backend.enabled (gt (len $backendPrefixes) 0) }}
    - matches:
        {{- range $backendPrefixes }}
        - path:
            type: PathPrefix
            value: {{ . | quote }}
        {{- end }}
      backendRefs:
        - name: {{ include "bubble.backend.fullname" . }}
          port: {{ .Values.backend.service.port }}
          weight: 1
    {{- end }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ $frontendPrefix | quote }}
      backendRefs:
        - name: {{ include "bubble.frontend.fullname" . }}
          port: {{ .Values.frontend.service.port }}
          weight: 1
    {{- with .Values.frontend.httpRoute.additionalRules }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
